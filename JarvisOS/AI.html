<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:100%;
    max-width:900px;
    height:90vh;
    background:#111827;
    border-radius:18px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
}

.header{
    padding:20px;
    background:#1f2937;
    border-bottom:1px solid #374151;
    font-size:22px;
    font-weight:700;
}

.preview{
    width:120px;
    border-radius:12px;
    margin-bottom:10px;
    border:2px solid #374151;
}

.chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

.message{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    word-wrap:break-word;
}

.user{
    background:#2563eb;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

.bot{
    background:#1f2937;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.footer{
    display:flex;
    gap:10px;
    padding:18px;
    border-top:1px solid #374151;
    background:#111827;
}

textarea{
    flex:1;
    resize:none;
    border:none;
    outline:none;
    background:#1f2937;
    color:white;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    height:56px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:0 24px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
}

button:hover{
    background:#3b82f6;
}

.typing{
    opacity:.7;
    font-style:italic;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#374151;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="header">
        🤖 AI Assistant
    </div>

    <div class="chat" id="chat">
        <div class="message bot">
            Hello! How can I help you today?
        </div>
    </div>

    <div class="footer">
        <textarea id="userInput"></textarea>
        <button id="sendBtn">Send</button>
    </div>

</div>
<script src="https://js.puter.com/v2/"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
<script>

const chat = document.getElementById("chat");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

/**
 * =========================
 * STATE (IMPORTANT FIX)
 * =========================
 */
let currentImage = null; // <-- FIX: ONLY ONE ACTIVE IMAGE
let isSending = false;

const history = JSON.parse(localStorage.getItem("history") || "[]");

/**
 * =========================
 * INIT
 * =========================
 */
restoreHistory();
autoResize();

/**
 * =========================
 * EVENTS
 * =========================
 */

sendBtn.onclick = sendMessage;

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

input.addEventListener("input", autoResize);

/**
 * =========================
 * IMAGE PASTE (FIXED)
 * =========================
 */
input.addEventListener("paste", (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;

    for (const item of items) {
        if (item.type.startsWith("image/")) {
            const file = item.getAsFile();
            if (!file) return;

            currentImage = file;

            showImagePreview(file);

            e.preventDefault();
            break;
        }
    }
});

/**
 * =========================
 * DRAG & DROP (FIXED)
 * =========================
 */
document.addEventListener("dragover", (e) => e.preventDefault());

document.addEventListener("drop", (e) => {
    e.preventDefault();

    const file = e.dataTransfer?.files?.[0];
    if (!file || !file.type.startsWith("image/")) return;

    currentImage = file;
    showImagePreview(file);
});

//////////////////////////////////////////////////////////
// SEND MESSAGE
//////////////////////////////////////////////////////////

async function sendMessage() {

    if (isSending) return;

    const text = input.value.trim();

    if (!text && !currentImage) return;

    isSending = true;

    const imageToSend = currentImage;
    currentImage = null; // 🔥 prevent reuse IMMEDIATELY

    addUserMessage(text, imageToSend);

    input.value = "";
    autoResize();

    removePreview();

    const thinking = addThinking();

    try {

        let response;

        // Check if puter.ai is available
        if (typeof puter !== 'undefined' && puter.ai && typeof puter.ai.chat === 'function') {
            if (imageToSend) {

                response = await puter.ai.chat({
                    model: "claude-sonnet-5",
                    messages: [
                        {
                            role: "user",
                            content: [
                                { type: "text", text: text || "Analyze this image." },
                                { type: "image", image: imageToSend }
                            ]
                        }
                    ]
                });

            } else {

                response = await puter.ai.chat({
                    model: "claude-sonnet-5",
                    messages: [
                        {
                            role: "user",
                            content: text
                        }
                    ]
                });
            }
        } else {
            // Fallback response when Puter AI is not available
            throw new Error('AI service not available - this application is designed to run on Puter platform (https://puter.com)');
        }

        thinking.remove();

        const reply = extractText(response);

        addBotMessage(reply);

    }

    catch (err) {

        console.error("AI ERROR:", err);

        thinking.remove();

        // Provide user-friendly error message
        const errorMessage = (err.message || err.error || String(err)).toLowerCase();
        if (errorMessage.includes('ai service') || errorMessage.includes('not available') || errorMessage.includes('unavailable')) {
            addBotMessage('AI service unavailable. This app is designed to run on Puter platform (https://puter.com). For local testing, you would need to integrate with an AI API directly.');
        } else if (errorMessage.includes('all') || errorMessage.includes('failed') || errorMessage.includes('provider')) {
            addBotMessage('AI service unavailable. Please check your internet connection and Puter authentication.');
        } else {
            addBotMessage("Something went wrong. Check console for details.");
        }

    }

    finally {
        isSending = false;
    }
}
//////////////////////////////////////////////////////////
// USER MESSAGE
//////////////////////////////////////////////////////////

function addUserMessage(text, image) {

    const div = document.createElement("div");

    div.className = "message user";

    let imgElement = null;

    if (text) {

        const p = document.createElement("div");

        p.textContent = text;

        div.appendChild(p);

    }

    if (image) {

        imgElement = document.createElement("img");

        imgElement.className = "chat-image";

        imgElement.src = URL.createObjectURL(image);

        div.appendChild(imgElement);

    }

    chat.appendChild(div);

    history.push({

        role: "user",

        text,

        image: image ? imgElement?.src : null

    });

    saveHistory();

    scrollBottom();

}

//////////////////////////////////////////////////////////
// BOT MESSAGE
//////////////////////////////////////////////////////////

function addBotMessage(text) {

    const div = document.createElement("div");

    div.className = "message bot";

    div.innerHTML = marked.parse(text);

    chat.appendChild(div);

    div.querySelectorAll("pre code").forEach(block => {

        hljs.highlightElement(block);

        addCopyButton(block);

    });

    history.push({

        role: "assistant",

        text

    });

    saveHistory();

    scrollBottom();

}

//////////////////////////////////////////////////////////
// THINKING
//////////////////////////////////////////////////////////

function addThinking() {

    const div = document.createElement("div");

    div.className = "message bot";

    div.innerHTML =

        `
<div class="typing">

<span></span>
<span></span>
<span></span>

</div>
`;

    chat.appendChild(div);

    scrollBottom();

    return div;

}

//////////////////////////////////////////////////////////
// COPY BUTTON
//////////////////////////////////////////////////////////

function addCopyButton(code) {

    const pre = code.parentElement;

    const button = document.createElement("button");

    button.className = "copy-btn";

    button.textContent = "Copy";

    button.onclick = async () => {

        await navigator.clipboard.writeText(code.innerText);

        button.textContent = "Copied!";

        setTimeout(() => {

            button.textContent = "Copy";

        }, 1500);

    };

    pre.style.position = "relative";

    pre.appendChild(button);

}

//////////////////////////////////////////////////////////
// IMAGE PREVIEW
//////////////////////////////////////////////////////////

function showImagePreview(file) {

    let preview = document.getElementById("preview");

    if (!preview) {

        preview = document.createElement("img");

        preview.id = "preview";

        preview.className = "preview";

        document.querySelector(".footer").prepend(preview);

    }

    preview.src = URL.createObjectURL(file);

}

//////////////////////////////////////////////////////////
// AUTOSIZE
//////////////////////////////////////////////////////////

function autoResize() {

    input.style.height = "0px";

    input.style.height = input.scrollHeight + "px";

}

//////////////////////////////////////////////////////////
// HISTORY
//////////////////////////////////////////////////////////

function saveHistory() {

    localStorage.setItem(

        "history",

        JSON.stringify(history)

    );

}

function restoreHistory() {

    history.forEach(msg => {

        const div = document.createElement("div");

        div.className = "message " +

            (msg.role === "user"

                ? "user"

                : "bot");

        if (msg.role === "assistant") {

            div.innerHTML = marked.parse(msg.text);

            chat.appendChild(div);

            div.querySelectorAll("pre code").forEach(block => {

                hljs.highlightElement(block);

                addCopyButton(block);

            });

        }

        else {

            if (msg.text) {

                const p = document.createElement("div");

                p.textContent = msg.text;

                div.appendChild(p);

            }

            if (msg.image) {

                const img = document.createElement("img");

                img.className = "chat-image";

                // Try to set the image source, but handle gracefully if it fails
                // (which happens with blob URLs after page refresh)
                img.onload = function() {
                    // Image loaded successfully
                };
                img.onerror = function() {
                    // Image failed to load (likely invalid blob URL from previous session)
                    // Hide the image element instead of showing broken image icon
                    this.style.display = 'none';
                };

                try {
                    img.src = msg.image;
                } catch (e) {
                    // Setting src failed (e.g., invalid URL)
                    console.warn("Could not set image source from history:", e);
                    img.style.display = 'none';
                }

                div.appendChild(img);

            }

            chat.appendChild(div);

        }

    });

    scrollBottom();

}

//////////////////////////////////////////////////////////
// HELPERS
//////////////////////////////////////////////////////////

function extractText(response) {

    console.log("RAW RESPONSE:", response);

    return (
        response?.message?.content?.[0]?.text ??
        response?.message?.content ??
        response?.text ??
        response?.content ??
        JSON.stringify(response, null, 2) ??
        "No response"
    );
}

function removePreview() {

    const preview = document.getElementById("preview");
    if (preview) preview.remove();
}

function scrollBottom() {

    chat.scrollTop = chat.scrollHeight;

}
</script>

</body>
</html>
